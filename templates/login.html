<!DOCTYPE html>
<html>
<head>
    <title>Operations Portal Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #2c3e50, #4b6584);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .login-card h1 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            text-align: center;
        }

        .login-card p {
            margin: 0 0 25px 0;
            color: #666;
            text-align: center;
        }

        label {
            font-weight: bold;
            color: #2c3e50;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: #2c3e50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1f2d3a;
        }

        .register-link {
            text-align: center;
            margin-top: 18px;
        }

        .register-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .flash {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Operations Portal</h1>
    <p>PTO Management Portal</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter your username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>
    </form>

    <div class="register-link">
        <p>Need an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
</div>

</body>
</html>
